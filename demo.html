<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
	
	<!-- oggetto di ricerca -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
	<!-- mini-mappa -->
	<link rel="stylesheet" href="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.css" />
	<!-- coordinate con hover del mouse -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.css" />
	
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<!-- oggetto di ricerca -->
	<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
	<!-- mini-mappa -->
	<script src="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.js"></script>
	<!-- coordinate con hover del mouse -->
	<script src="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.js"></script>
	
	<link rel="stylesheet" href="MapCSS.css" />
	<script src="BetterWMS.js"></script>
	<script src="WebMap.js"></script>
	
	<!-- 
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.5.0/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.js"></script>
	-->
</head>

<body>
	<div id="map"></div>	
	
	<script>
		// ---> Toscana !!
		
		// considerare la scelta di spostare il bottone a destra invece che a destra
		// metodo per spostare posizione bottone Layer
		
		const map = new WebMap("map", {
			center: [42.032974, 13.40332],
			maxZoom: 21,
			zoom: 6
		});		
	</script>
	
	<div class="layer-button"></div>

	<div class="layer-panel">
		<div class="layer-group">
			<strong>Mappe di base</strong>
			<label><input type="radio" name="basemap" value="osm"> OSM </label><br>
			<label><input type="radio" name="basemap" value="satellite" checked> Satellite </label>
			<hr>
		</div>

		<div class="layer-group">
			<strong>Veneto</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_2024_Veneto"> Ortofoto 2024</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Veneto"> CTR</label><br>
			<label><input type="checkbox" class="overlay" value="edifici_veneto"> Edifici 2022</label>		
		</div>

		<div class="layer-group">
			<strong>Emilia-Romagna</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_202324_EmiliaRomagna"> Ortofoto 2023-24</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_EmiliaRomagna"> CTR</label><br>
			<label><input type="checkbox" class="overlay" value="usoDelSuolo_EmiliaRomagna"> Uso del suolo 2023</label>
		</div>
		
		<div class="layer-group">
			<strong>Toscana</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_2022_Toscana"> Ortofoto 2022</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Toscana"> CTR</label>
		</div>
		
		<div class="layer-group">
			<strong>Lazio</strong>
			<label><input type="checkbox" class="overlay" value="ortofotoCGR_200203_Lazio"> Ortofoto CGR 2002-03</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Lazio"> CTR</label><br>
		</div>
		
	</div>
	
	<script>
	
		const checkboxes = Array.from(document.getElementsByClassName("overlay"));
		/*
		checkboxes.forEach(cb => {

			cb.addEventListener("change", () => { 
				map.toggleLayer(map.map.overlays[value], !this.checked);
			});
		});
		*/
	
		map.setBasemap('satellite');
		map.toggleLayer('ctr_Veneto', true);
		map.toggleLayer('ortofoto_2022_Toscana', true);
		
		
	//	map.addBetterWMSLayer('edifici_scolastici_veneto', 'https://idt2-geoserver.regione.veneto.it/geoserver/ows', 'rv:edifici_scolastici');
		map.toggleLayer('ctr_Veneto', false);
		map.toggleLayer('edifici_veneto', true);
		
		new L.Control.Geocoder().addTo(map.map);
	
		
		// mini-mappa
		basemapUrl = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
		var baseMap = new L.TileLayer(basemapUrl, {minZoom: 0, maxZoom: 13});
		var miniMap = new L.Control.MiniMap(baseMap).addTo(map.map);
		
		// coordinate per hover mouse
		L.control.mousePosition({
			position: "bottomleft",
			separator: " | ",
			numDigits: 6,
			prefix: "Coordinate:"
		}).addTo(map.map);
		
	</script>
	
</body>

</html>
