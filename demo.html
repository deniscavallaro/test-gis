<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
	
	<!-- oggetto di ricerca -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
	<!-- mini-mappa -->
	<link rel="stylesheet" href="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.css" />
	<!-- coordinate con hover del mouse -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.css" />
	
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<!-- oggetto di ricerca -->
	<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
	<!-- mini-mappa -->
	<script src="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.js"></script>
	<!-- coordinate con hover del mouse -->
	<script src="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.js"></script>
	
	<!-- 
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.5.0/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.js"></script>
	-->
	
	<style>
		html, body, #map {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
	</style>
</head>
	
<body>
	<div id="map"></div>
	<script>	
		
		var map = L.map('map', { maxZoom:21 } ).setView([42.358544, 14.194336], 6);	
		
		// basemaps
		var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '© OpenStreetMap'
		}).addTo(map);
		
		var stradeGoogle = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
			subdomains:['mt0','mt1','mt2','mt3']
		});
		
		var ortofoto_2024_Veneto = L.tileLayer.wms('https://idt2-geoserver.regione.veneto.it/geoserver/ows', {
			layers: 'rv:ortofoto_agea_full_2024',
			format: 'image/png',
			transparent: true
		});	
		
	/*	var ortofoto_2021_Veneto = L.tileLayer.wms('https://idt2-geoserver.regione.veneto.it/geoserver/ows', {
			layers: 'rv:ortofoto_2021',
			format: 'image/png',
			transparent: true
		});	
		
		var ortofoto_2018_Veneto = L.tileLayer.wms('https://idt2-geoserver.regione.veneto.it/geoserver/ows', {
			layers: 'rv:ortofoto_2021',
			format: 'image/png',
			transparent: true
		});	*/
		
		var ortofoto_202324_EmiliaRomagna = L.tileLayer.wms('https://servizigis.regione.emilia-romagna.it/wms/rer2023_24_rgb', {
			layers: 'RER2023_24_RGB',
			format: 'image/png',
			transparent: true
		});	
		
		var ortofotoCGR_200203_Lazio = L.tileLayer.wms('https://geoportale.regione.lazio.it/geoserver/ows', {
			layers: 'geonode:2002_2003_CGR_25833_COG',
			format: 'image/png',
			transparent: true
		});
		// -------- EPSG:7791
		var ortofoto_2022_Toscana = L.tileLayer.wms('https://www502.regione.toscana.it/ows_ofc/com.rt.wms.RTmap/wms?map=owsofc&', {
			layers: 'rt_ofc.5k22.32bit',
			format: 'text/html',
			transparent: true
		});
		
		var ctr_Veneto = L.tileLayer.wms('https://idt2-geoserver.regione.veneto.it/geoserver/ows', {
			layers: 'rv:ctrr',
			format: 'image/png',
			transparent: true
		});	
		
		var ctr_EmiliaRomagna = L.tileLayer.wms('https://servizigis.regione.emilia-romagna.it/wms/dbtr_ctr5', {
			layers: 'DBTR_Ctr5',
			format: 'image/png',
			transparent: true
		});	
		
		var ctr_Lazio = L.tileLayer.wms('https://geoportale.regione.lazio.it/geoserver/ows', {
			layers: 'geonode:ctr_5k_2020',
			format: 'image/png',
			transparent: true
		});	
		// -------- EPSG:6707
		var ctr_Toscana = L.tileLayer.wms('https://www502.regione.toscana.it/ows_ctr/com.rt.wms.RTmap/ows?map=owsctr&', {
			layers: 'rt_ctr.10k',
			format: 'text/xml',
			transparent: true
		});	
		
		// layers
		var usoDelSuolo_EmiliaRomagna = L.tileLayer.wms('https://servizigis.regione.emilia-romagna.it/wms/uso_del_suolo', {
			layers: '2020_uso_suolo_ed2023',
			format: 'image/png',
			transparent: true
		});	
		
		
		var baseMaps = {
			"OpenStreetMap": osm,
			"Strade - Google": stradeGoogle,
			"Ortofoto Veneto - 2024": ortofoto_2024_Veneto,
		//	"Ortofoto Veneto - 2021": ortofoto_2021_Veneto,
		//	"Ortofoto Veneto - 2018": ortofoto_2018_Veneto,
			"Ortofoto Emilia-Romagna - 2023-24": ortofoto_202324_EmiliaRomagna,
			"Ortofoto Lazio - 2002-03": ortofotoCGR_200203_Lazio,
			"Ortofoto Toscana - 2022": ortofoto_2022_Toscana,
			"CTR - Veneto": ctr_Veneto,
			"CTR - Emilia-Romagna": ctr_EmiliaRomagna,
			"CTR - Lazio": ctr_Lazio,
			"CTR - Toscana": ctr_Toscana
		};
		
		var overlayMaps = {
			"Uso del suolo Emilia-Romagna": usoDelSuolo_EmiliaRomagna
		};
		
		var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);
		
		new L.Control.Geocoder().addTo(map);
		
		map.on('click', (e) => {
				L.popup().setLatLng(e.latlng).setContent("Coordinate: " + e.latlng.toString()).openOn(map);
			}
		);
		
		// mini-mappa
		basemapUrl = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
		var baseMap = new L.TileLayer(basemapUrl, {minZoom: 0, maxZoom: 13});
		var miniMap = new L.Control.MiniMap(baseMap).addTo(map);
		
		// coordinate per hover mouse
		L.control.mousePosition({
			position: "bottomleft",
			separator: " | ",
			numDigits: 6,
			prefix: "Coordinate:"
		}).addTo(map);

	</script>
</body>

</html>
