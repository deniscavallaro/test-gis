<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
	
	<!-- oggetto di ricerca -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
	<!-- mini-mappa -->
	<link rel="stylesheet" href="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.css" />
	<!-- coordinate con hover del mouse -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.css" />
	
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<!-- oggetto di ricerca -->
	<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
	<!-- mini-mappa -->
	<script src="Leaflet-MiniMap-master/Leaflet-MiniMap-master/src/Control.MiniMap.js"></script>
	<!-- coordinate con hover del mouse -->
	<script src="https://unpkg.com/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.js"></script>
	
	<link rel="stylesheet" href="MapCSS.css" />
	<script src="BetterWMS.js"></script>
	<script src="WebMap.js"></script>
	
	<!-- 
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.5.0/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.js"></script>
	-->
</head>

<body>
	<div id="map"></div>	
	
	<script>
		// metodo per far apparire solo i layer della regione d'interesse
		// nel panello della gerarchia, tramite parametro
		
		// controllare se c'è catasto toscana
		
		// problema visualizzazione layer edifici
	
		const map = new WebMap("map", {
			center: [42.032974, 13.40332],
			maxZoom: 21,
			zoom: 6
		});
		
		map.setBasemap("osm");
	</script>
	
	<div class="layer-button"></div>
	
	<div class="region-panel">
		<strong>Seleziona Regione</strong><br>
		<label><input type="radio" name="region" value="tutte"> Tutte</label><br>
		<label><input type="radio" name="region" value="veneto"> Veneto</label><br>
		<label><input type="radio" name="region" value="emilia"> Emilia-Romagna</label><br>
		<label><input type="radio" name="region" value="toscana"> Toscana</label><br>
		<label><input type="radio" name="region" value="lazio"> Lazio</label>
	</div>
	
	<div class="layer-panel">
		<div class="layer-group">
			<strong>Mappe di base</strong>
			<label><input type="radio" name="basemap" value="osm" class="basemap" checked> OSM </label><br>
			<label><input type="radio" name="basemap" value="satellite" class="basemap"> Satellite </label>
			<hr>
		</div>

		<div class="layer-group veneto">
			<strong>Veneto</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_2024_Veneto"> Ortofoto 2024</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Veneto"> CTR</label><br>
			<label><input type="checkbox" class="overlay" value="edifici_Veneto"> Edifici 2022</label>		
		</div>

		<div class="layer-group emilia">
			<strong>Emilia-Romagna</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_202324_EmiliaRomagna"> Ortofoto 2023-24</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_EmiliaRomagna"> CTR</label><br>
			<label><input type="checkbox" class="overlay" value="usoDelSuolo_EmiliaRomagna"> Uso del suolo 2023</label>
		</div>
		
		<div class="layer-group toscana">
			<strong>Toscana</strong>
			<label><input type="checkbox" class="overlay" value="ortofoto_2022_Toscana"> Ortofoto 2022</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Toscana"> CTR</label>
		</div>
		
		<div class="layer-group lazio">
			<strong>Lazio</strong>
			<label><input type="checkbox" class="overlay" value="ortofotoCGR_200203_Lazio"> Ortofoto CGR 2002-03</label><br>
			<label><input type="checkbox" class="overlay" value="ctr_Lazio"> CTR</label><br>
		</div>
		
	</div>
	
	<script>
		
		const regionRadios = document.getElementsByName("region");
		const regionPanel = document.getElementsByClassName("region-panel")[0];
		const layerPanel = document.getElementsByClassName("layer-panel")[0];
		const groups = document.getElementsByClassName("layer-group");
	
		for (let i = 0; i < regionRadios.length; i++) {

			regionRadios[i].addEventListener("change", function () {

				const region = this.value;

				regionPanel.style.display = "none";
				layerPanel.style.display = "block";
		
				for (let j = 0; j < groups.length; j++) {

					const group = groups[j];
		
					if (region === "tutte") {
						group.style.display = "block";
						continue;
					}

					if (group.classList.contains(region)) {
						group.style.display = "block";
					} else {

						// verifica se contiene una basemap
						const basemap = group.getElementsByClassName("basemap");
		
						if (basemap.length === 0) {
							group.style.display = "none";
						}
					}
				}
		
			});

		}
		
		
		const radios = Array.from(document.getElementsByClassName("basemap"));

		radios.forEach((rb) => {
	
			rb.addEventListener("change", function () {

				if (this.checked) {
					map.setBasemap(this.value);
				}

			});

		});
		
		
		const checkboxes = Array.from(document.getElementsByClassName("overlay"));
		
		checkboxes.forEach( (cb) => {
		
			cb.addEventListener("click", function() { 
			
				if (this.checked)
				{	
					map.toggleLayer(this.value, true);
				}
				else
				{
					map.toggleLayer(this.value, false)
				}
			});
			
		});
		
	
		
		
	//	map.addBetterWMSLayer('edifici_scolastici_veneto', 'https://idt2-geoserver.regione.veneto.it/geoserver/ows', 'rv:edifici_scolastici');

		new L.Control.Geocoder().addTo(map.map);
	
		
		// mini-mappa
		basemapUrl = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
		var baseMap = new L.TileLayer(basemapUrl, {minZoom: 0, maxZoom: 13});
		var miniMap = new L.Control.MiniMap(baseMap).addTo(map.map);
		
		// coordinate per hover mouse
		L.control.mousePosition({
			position: "bottomleft",
			separator: " | ",
			numDigits: 6,
			prefix: "Coordinate:"
		}).addTo(map.map);
		
	</script>
	
</body>

</html>
